<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 石斛幼苗智能培育管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 沿用 Preview 风格变量 */
            --bg: #07111f;
            --panel: rgba(255,255,255,.08);
            --line: rgba(255,255,255,.14);
            --text: #edf4ff;
            --muted: #9eb1ca;
            --brand: #57d8ff;
            --brand2: #6d7cff;
            --good: #2bd576;
            --warn: #ffb84d;
            --danger: #ff6b6b;
            --shadow: 0 20px 60px rgba(0,0,0,.35);
            --radius: 22px;
            --input-bg: rgba(0,0,0,0.3);
            --input-border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            min-height: 100vh;
            font-family: 'Roboto', "Microsoft YaHei", sans-serif;
            color: var(--text);
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; opacity: .18; z-index: 0;
            background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.1));
        }

        .ambient-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at 20% 40%, rgba(87,216,255,.15) 0%, transparent 45%),
                        radial-gradient(circle at 80% 60%, rgba(109,124,255,.12) 0%, transparent 45%);
        }

        .login-container {
            width: min(1000px, 90%);
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            background: rgba(13, 25, 48, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--line);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* 左侧信息区 */
        .info-side {
            padding: 48px;
            background: linear-gradient(135deg, rgba(87,216,255,.05), rgba(109,124,255,.05));
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--line);
            position: relative;
        }
        
        .brand-badge {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: #05111b; display: grid; place-items: center; font-size: 24px; font-weight: 900;
            margin-bottom: 24px; box-shadow: 0 10px 20px rgba(87,216,255,0.3);
        }

        .info-side h2 { font-size: 28px; margin-bottom: 16px; color: white; letter-spacing: 1px; }
        .info-side p { color: var(--muted); line-height: 1.7; font-size: 15px; margin-bottom: 32px; }

        .feature-list { display: grid; gap: 16px; }
        .feature-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #dce9fa; font-size: 14px;
            transition: all 0.3s;
        }
        .feature-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.06); border-color: rgba(87,216,255,0.3); }
        .feature-item i { color: var(--brand); font-size: 18px; width: 24px; text-align: center; }

        /* 右侧登录区 */
        .form-side {
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header { margin-bottom: 32px; }
        .form-header h3 { font-size: 24px; color: white; margin-bottom: 8px; }
        .form-header span { color: var(--muted); font-size: 14px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; color: #dce9fa; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; transition: color 0.3s; }
        
        .form-input {
            width: 100%; height: 50px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 0 46px;
            color: white; font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(87,216,255,0.15); background: rgba(0,0,0,0.5); }
        .form-input:focus + i { color: var(--brand); }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-login {
            width: 100%; height: 50px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            border: none; border-radius: 12px;
            color: #05111b; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(87,216,255,0.25);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 12px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(87,216,255,0.35); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .form-footer {
            margin-top: 24px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .form-footer a { color: var(--brand); transition: color 0.2s; }
        .form-footer a:hover { color: #fff; text-decoration: underline; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; }
        .remember-me input { accent-color: var(--brand); width: 16px; height: 16px; cursor: pointer; }

        .back-link {
            position: absolute; top: 24px; left: 24px;
            color: var(--muted); font-size: 14px;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .back-link:hover { background: rgba(255,255,255,0.08); color: white; transform: translateX(-3px); }

        .message-box {
            padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; align-items: center; gap: 10px;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-error { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); color: #fca5a5; }
        .msg-success { background: rgba(22, 163, 74, 0.15); border: 1px solid rgba(22, 163, 74, 0.3); color: #86efac; }

        /* 移动端适配 */
        @media (max-width: 900px) {
            body { display: block; overflow-y: auto; padding: 20px; height: auto; }
            .login-container { grid-template-columns: 1fr; width: 100%; transform: none; opacity: 1; margin: 40px auto; }
            .info-side { padding: 32px 24px; order: 2; border-right: none; border-top: 1px solid var(--line); }
            .form-side { padding: 40px 24px; order: 1; }
            .back-link { position: static; width: fit-content; margin-bottom: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>

    <div class="login-container">
        
        <!-- 左侧：产品展示 -->
        <div class="info-side">
            <div class="brand-badge">斛</div>
            <h2>智能培育管理终端</h2>
            <p>连接您的 IoT 感知设备，开启数字化育苗新体验。实时监控、远程调控、病害预警，尽在掌握。</p>
            
            <div class="feature-list">
                <div class="feature-item">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>实时环境数据可视化监控</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-robot"></i>
                    <span>边缘计算自动环控策略</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-shield-virus"></i>
                    <span>病虫害风险智能预警</span>
                </div>
            </div>
        </div>

        <!-- 右侧：登录表单 -->
        <div class="form-side">
            <a href="preview.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>

            <div class="form-header">
                <h3>欢迎回来</h3>
                <span>请使用管理员账号登录系统</span>
            </div>

            <div id="msg-box" class="message-box">
                <i class="fa-solid fa-circle-info"></i> <span id="msg-text"></span>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>账号 / Username</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="请输入您的账号" required>
                        <i class="fa-regular fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>密码 / Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入您的密码" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> 记住我
                    </label>
                    <a href="register.html">注册新账号</a>
                </div>

                <button type="submit" class="btn-login" id="submit-btn">
                    <span>立即登录</span> <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

    </div>

<script>
    const form = document.getElementById('login-form');
    const msgBox = document.getElementById('msg-box');
    const msgText = document.getElementById('msg-text');
    const btn = document.getElementById('submit-btn');

    // 自动填充记住的用户名
    const savedUser = localStorage.getItem('iot_user');
    if(savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('remember').checked = true;
    }

    function showMsg(text, type='error') {
        msgBox.style.display = 'flex';
        msgBox.className = `message-box ${type === 'success' ? 'msg-success' : 'msg-error'}`;
        msgText.textContent = text;
        msgBox.querySelector('i').className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const remember = document.getElementById('remember').checked;

        if(!username || !password) return showMsg('请输入完整的账号和密码');

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在验证...';

        try {
            // 这里调用真实的后端登录接口
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if(data.success) {
                showMsg('登录成功，正在跳转...', 'success');
                if(remember) localStorage.setItem('iot_user', username);
                else localStorage.removeItem('iot_user');
                
                setTimeout(() => window.location.href = '/console/index.html', 800);
            } else {
                showMsg(data.message || '账号或密码错误');
                btn.disabled = false;
                btn.innerHTML = '<span>立即登录</span> <i class="fa-solid fa-arrow-right"></i>';
            }
        } catch (err) {
            showMsg('网络连接异常，请稍后重试');
            btn.disabled = false;
            btn.innerHTML = '<span>立即登录</span> <i class="fa-solid fa-arrow-right"></i>';
        }
    });
</script>
</body>
</html>
