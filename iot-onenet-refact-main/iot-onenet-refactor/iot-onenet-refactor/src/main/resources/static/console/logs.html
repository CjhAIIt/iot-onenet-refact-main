<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台日志</title>
    <style>
        :root {
            --panel: rgba(10, 22, 38, 0.88);
            --line: rgba(145, 181, 227, 0.16);
            --text: #eef6ff;
            --muted: #9db2c8;
            --accent: #8fe1ff;
            --radius: 22px;
            --shadow: 0 18px 70px rgba(0, 0, 0, 0.34);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(143, 225, 255, 0.16), transparent 28%),
                radial-gradient(circle at 90% 10%, rgba(123, 240, 191, 0.14), transparent 30%),
                linear-gradient(160deg, #06101b 0%, #0d1828 52%, #12253d 100%);
            padding: 28px;
        }

        .shell {
            max-width: 1380px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }

        .topbar,
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .topbar {
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .topbar h1 { margin: 0 0 6px; font-size: 28px; }
        .topbar p { margin: 0; color: var(--muted); }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions a,
        .actions button {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), #b5ebff);
            color: #08131c;
            cursor: pointer;
            font-size: 14px;
        }

        .actions .secondary {
            background: rgba(255,255,255,0.08);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .panel { padding: 22px; }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr 160px 140px;
            gap: 12px;
        }

        select,
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            outline: none;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .summary-card {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .summary-card span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .summary-card strong {
            font-size: 22px;
            word-break: break-all;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
        }

        td {
            font-size: 14px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: #d8f2ff;
            font-family: Consolas, monospace;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 0;
        }

        @media (max-width: 1120px) {
            .filters,
            .summary { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <section class="topbar">
        <div>
            <h1>OneNET / AI 平台日志</h1>
            <p>OneNET 上行、LED 下发、set_reply 回执和 AI 识别结果都会写入服务端日志文件，并同步供控制台查询。</p>
        </div>
        <div class="actions">
            <a href="/console/index.html" class="secondary">返回控制台</a>
            <button id="refresh-btn" type="button">刷新</button>
        </div>
    </section>

    <section class="panel">
        <div class="filters">
            <input id="keyword" type="text" placeholder="关键字：设备 ID、摘要、JSON 字段">
            <select id="type">
                <option value="">全部类型</option>
                <option value="ONENET_UPLINK">ONENET_UPLINK</option>
                <option value="ONENET_COMMAND">ONENET_COMMAND</option>
                <option value="ONENET_SET_REPLY">ONENET_SET_REPLY</option>
                <option value="AI_DETECTION">AI_DETECTION</option>
            </select>
            <select id="limit">
                <option value="20">最近 20 条</option>
                <option value="50">最近 50 条</option>
                <option value="100" selected>最近 100 条</option>
                <option value="200">最近 200 条</option>
            </select>
            <button id="search-btn" type="button">查询日志</button>
        </div>
    </section>

    <section class="panel">
        <div class="summary">
            <div class="summary-card">
                <span>累计日志数</span>
                <strong id="summary-count">--</strong>
            </div>
            <div class="summary-card">
                <span>日志文件</span>
                <strong id="summary-file">--</strong>
            </div>
            <div class="summary-card">
                <span>支持类型</span>
                <strong id="summary-types">--</strong>
            </div>
        </div>
    </section>

    <section class="panel">
        <table>
            <thead>
            <tr>
                <th>时间</th>
                <th>类型</th>
                <th>设备</th>
                <th>摘要</th>
                <th>详情</th>
            </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </section>
</div>

<script>
    async function guardLogin() {
        try {
            const resp = await fetch('/api/check-login', { cache: 'no-store' });
            const json = await resp.json();
            if (!json.loggedIn) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        } catch (error) {
            window.location.href = '/login.html';
            return false;
        }
    }

    function formatTime(timestamp) {
        if (!timestamp) return '--';
        return new Date(timestamp).toLocaleString();
    }

    async function loadSummary() {
        const resp = await fetch('/api/logs/summary');
        const json = await resp.json();
        const data = json.data || {};
        document.getElementById('summary-count').textContent = data.count ?? 0;
        document.getElementById('summary-file').textContent = data.file || '--';
        document.getElementById('summary-types').textContent = (data.supportedTypes || []).join(', ') || '--';
    }

    async function loadLogs() {
        const params = new URLSearchParams();
        const keyword = document.getElementById('keyword').value.trim();
        const type = document.getElementById('type').value;
        const limit = document.getElementById('limit').value;
        params.set('limit', limit);
        if (keyword) params.set('keyword', keyword);
        if (type) params.set('type', type);

        const resp = await fetch(`/api/logs?${params.toString()}`);
        const json = await resp.json();
        const rows = json.data || [];
        const body = document.getElementById('log-body');

        if (!rows.length) {
            body.innerHTML = '<tr><td colspan="5" class="empty">当前没有匹配的日志记录</td></tr>';
            return;
        }

        body.innerHTML = rows.map(item => `
            <tr>
                <td>${formatTime(item.timestampMs)}</td>
                <td>${item.type || '--'}</td>
                <td>${item.deviceId || '--'}</td>
                <td>${item.summary || '--'}</td>
                <td><pre>${JSON.stringify(item.details || {}, null, 2)}</pre></td>
            </tr>
        `).join('');
    }

    document.getElementById('search-btn').addEventListener('click', () => {
        loadLogs().catch(console.error);
    });

    document.getElementById('refresh-btn').addEventListener('click', async () => {
        await loadSummary();
        await loadLogs();
    });

    (async () => {
        const ok = await guardLogin();
        if (!ok) return;
        await loadSummary();
        await loadLogs();
    })();
</script>
</body>
</html>
