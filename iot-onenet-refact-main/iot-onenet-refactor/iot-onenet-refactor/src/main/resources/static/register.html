<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 石斛幼苗智能培育管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 沿用 Preview 风格变量 */
            --bg: #07111f;
            --panel: rgba(255,255,255,.08);
            --line: rgba(255,255,255,.14);
            --text: #edf4ff;
            --muted: #9eb1ca;
            --brand: #57d8ff;
            --brand2: #6d7cff;
            --good: #2bd576;
            --warn: #ffb84d;
            --danger: #ff6b6b;
            --shadow: 0 20px 60px rgba(0,0,0,.35);
            --radius: 22px;
            --input-bg: rgba(0,0,0,0.3);
            --input-border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            min-height: 100vh;
            font-family: 'Roboto', "Microsoft YaHei", sans-serif;
            color: var(--text);
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; opacity: .18; z-index: 0;
            background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.1));
        }

        .ambient-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at 20% 40%, rgba(87,216,255,.15) 0%, transparent 45%),
                        radial-gradient(circle at 80% 60%, rgba(109,124,255,.12) 0%, transparent 45%);
        }

        .register-container {
            width: min(520px, 90%);
            background: rgba(13, 25, 48, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--line);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
            padding: 40px;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 32px; }
        .logo { 
            width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: #05111b; display: grid; place-items: center; font-size: 28px;
            box-shadow: 0 8px 24px rgba(87,216,255,0.25);
        }
        .header h1 { font-size: 24px; color: white; margin-bottom: 8px; font-weight: 700; }
        .header p { color: var(--muted); font-size: 14px; }

        .tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .tip-item {
            padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; color: #dce9fa; font-size: 13px; display: flex; align-items: center; gap: 8px;
        }
        .tip-item i { color: var(--brand); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #dce9fa; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; transition: color 0.3s; }
        
        .form-input {
            width: 100%; height: 50px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 0 46px;
            color: white; font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(87,216,255,0.15); background: rgba(0,0,0,0.5); }
        .form-input:focus + i { color: var(--brand); }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }

        .strength-meter { display: flex; gap: 6px; margin-top: 8px; height: 4px; }
        .meter-bar { flex: 1; background: rgba(255,255,255,0.1); border-radius: 2px; transition: all 0.3s; }
        .meter-bar.active-1 { background: var(--danger); }
        .meter-bar.active-2 { background: var(--warn); }
        .meter-bar.active-3 { background: var(--good); }
        .strength-text { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: right; }

        .btn-submit {
            width: 100%; height: 50px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            border: none; border-radius: 12px;
            color: #05111b; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(87,216,255,0.25);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 24px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(87,216,255,0.35); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
        .footer-link a { color: var(--brand); margin-left: 6px; font-weight: 500; transition: color 0.2s; }
        .footer-link a:hover { color: white; text-decoration: underline; }

        .message-box {
            padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; align-items: center; gap: 10px;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-error { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); color: #fca5a5; }
        .msg-success { background: rgba(22, 163, 74, 0.15); border: 1px solid rgba(22, 163, 74, 0.3); color: #86efac; }

        /* 移动端适配 */
        @media (max-width: 600px) {
            body { display: block; overflow-y: auto; padding: 20px; height: auto; }
            .register-container { width: 100%; margin: 20px auto; padding: 30px 24px; transform: none; opacity: 1; }
            .tips-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="ambient-glow"></div>

    <div class="register-container">
        <div class="header">
            <div class="logo"><i class="fa-solid fa-user-plus"></i></div>
            <h1>创建新管理员账号</h1>
            <p>注册后可直接获得系统管理权限，与现有默认账号并行使用。</p>
        </div>

        <div class="tips-grid">
            <div class="tip-item"><i class="fa-solid fa-check-circle"></i> 用户名支持字母/数字/下划线</div>
            <div class="tip-item"><i class="fa-solid fa-shield-alt"></i> 密码建议 6 位以上混合字符</div>
        </div>

        <div id="msg-box" class="message-box">
            <i class="fa-solid fa-circle-info"></i> <span id="msg-text"></span>
        </div>

        <form id="register-form">
            <div class="input-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="username" placeholder="设置您的登录账号" maxlength="32" required>
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>

            <div class="input-group">
                <label>登录密码</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="设置您的登录密码" minlength="6" maxlength="32" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="strength-meter">
                    <div class="meter-bar" id="bar-1"></div>
                    <div class="meter-bar" id="bar-2"></div>
                    <div class="meter-bar" id="bar-3"></div>
                </div>
                <div class="strength-text" id="strength-text">密码强度：未输入</div>
            </div>

            <div class="input-group">
                <label>确认密码</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="confirm-password" placeholder="再次输入密码以确认" minlength="6" maxlength="32" required>
                    <i class="fa-solid fa-check-double"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>立即注册</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="footer-link">
            已有账号？ <a href="login.html">直接登录</a>
        </div>
    </div>

<script>
    const form = document.getElementById('register-form');
    const msgBox = document.getElementById('msg-box');
    const msgText = document.getElementById('msg-text');
    const btn = document.getElementById('submit-btn');
    const passInput = document.getElementById('password');
    const bar1 = document.getElementById('bar-1');
    const bar2 = document.getElementById('bar-2');
    const bar3 = document.getElementById('bar-3');
    const strengthLabel = document.getElementById('strength-text');

    function showMsg(text, type='error') {
        msgBox.style.display = 'flex';
        msgBox.className = `message-box ${type === 'success' ? 'msg-success' : 'msg-error'}`;
        msgText.textContent = text;
        msgBox.querySelector('i').className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
    }

    // 密码强度检测
    passInput.addEventListener('input', function() {
        const val = this.value;
        let score = 0;
        if(val.length >= 6) score++;
        if(/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
        if(/[^A-Za-z0-9]/.test(val) && val.length >= 8) score++;

        bar1.className = 'meter-bar' + (score >= 1 ? ' active-1' : '');
        bar2.className = 'meter-bar' + (score >= 2 ? ' active-2' : '');
        bar3.className = 'meter-bar' + (score >= 3 ? ' active-3' : '');

        const labels = ['未输入', '弱', '中等', '强'];
        strengthLabel.textContent = '密码强度：' + (val ? labels[score] : '未输入');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = passInput.value.trim();
        const confirm = document.getElementById('confirm-password').value.trim();

        if(!/^[a-zA-Z0-9_]{3,32}$/.test(username)) return showMsg('用户名格式错误：仅支持3-32位字母、数字或下划线');
        if(password.length < 6) return showMsg('密码长度至少需要6位');
        if(password !== confirm) return showMsg('两次输入的密码不一致');

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在创建...';

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, confirmPassword: confirm })
            });
            const data = await res.json();

            if(data.success) {
                showMsg('注册成功！正在跳转登录页...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1000);
            } else {
                showMsg(data.message || '注册失败，请重试');
                btn.disabled = false;
                btn.innerHTML = '<span>立即注册</span> <i class="fa-solid fa-arrow-right"></i>';
            }
        } catch (err) {
            showMsg('网络连接异常，请稍后重试');
            btn.disabled = false;
            btn.innerHTML = '<span>立即注册</span> <i class="fa-solid fa-arrow-right"></i>';
        }
    });
</script>
</body>
</html>
